name: FreeBSD Rust version

on:
  # To run manually workflow
  workflow_dispatch:

  # Schedule workflow
  schedule:
    - cron: "0 23 * * *"

env:
  FREEBSD_VERSION: '15.0'

permissions:
  contents: write

jobs:
  rust-version:
    name: Get FreeBSD Rust version
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Start FreeBSD VM
      id: start-freebsd
      uses: cross-platform-actions/action@0c165ad7eb2d6a7e8552d6af5aad2bbedfc646b0 # v1.1.0
      with:
        operating_system: freebsd
        version: ${{ env.FREEBSD_VERSION }}
        sync_files: true

    - name: Get FreeBSD Rust version
      id: get-rust-version
      shell: cpa.sh {0}
      run: |
        set -e
        sh get_freebsd_rust_version.sh

    - name: Dump FreeBSD Rust version
      id: dump-version
      run: |
        echo "Rust version = $RUST_VERSION"
        if $SAME_VERSION; then
          echo "No need to commit new Rust version"
          echo "**Current Rust version:** $RUST_VERSION on FreeBSD ${{ env.FREEBSD_VERSION }}" >> $GITHUB_STEP_SUMMARY
        else
          echo "Rust version changed => need to commit it"
          echo "**New Rust version:** $RUST_VERSION on FreeBSD ${{ env.FREEBSD_VERSION }}" >> $GITHUB_STEP_SUMMARY
        fi
        printf "\n"
        cat freebsd_rust_version.txt

    - name: Commit FreeBSD Rust version
      id: commit-version
      if: env.SAME_VERSION == 'false'
      run: |
        git add freebsd_rust_version.txt
        git commit -m "Update for FreeBSD Rust version ${{ env.RUST_VERSION }}\n\nAutomatic commit by job '${{ github.job }}' - run #${{ github.run_number }}\n"
        git tag "${{ env.RUST_VERSION }}"
        git push
        git push --tags
